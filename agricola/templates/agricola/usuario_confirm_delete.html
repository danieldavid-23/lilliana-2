{% extends 'agricola/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 4rem;"></i>
                <h4 class="mt-3">Eliminar Usuario</h4>
                <p class="text-muted">Estas seguro de eliminar al usuario <strong>{{ usuario.username }}</strong>?</p>
                <p class="text-danger small">Esta accion no se puede deshacer.</p>
                <form method="post" class="ajax-form">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <a href="{% url 'usuario_list' %}" class="btn btn-secondary rounded-pill px-4 no-spa">Cancelar</a>
                        <button type="submit" class="btn btn-danger rounded-pill px-4">
                            <i class="bi bi-trash"></i> Eliminar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
