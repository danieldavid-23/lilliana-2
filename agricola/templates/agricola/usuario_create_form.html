{% extends 'agricola/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h4 class="mb-0 text-primary"><i class="bi bi-person-plus"></i> Crear Usuario</h4>
            </div>
            <div class="card-body">
                <form method="post" class="ajax-form">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.help_text %}<div class="form-text small">{{ field.help_text }}</div>{% endif %}
                        {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
                    </div>
                    {% endfor %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Rol del usuario</label>
                        <select name="rol" class="form-select">
                            <option value="Comprador" selected>Comprador</option>
                            <option value="Vendedor">Vendedor</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success rounded-pill py-2">
                            <i class="bi bi-check-lg"></i> Crear Usuario
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
